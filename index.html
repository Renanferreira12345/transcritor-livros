<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#7a1c1c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Transcritor"/>
<title>Transcritor — Rev. Renan</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #1a1208;
  --parchment: #f5ede0;
  --gold: #c9952a;
  --red-deep: #7a1c1c;
  --cream: #fdf8f0;
  --shadow: rgba(26,18,8,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--parchment);
  color: var(--ink);
  font-family: 'Crimson Pro', Georgia, serif;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(201,149,42,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(122,28,28,0.06) 0%, transparent 60%);
}

header {
  background: var(--red-deep);
  color: white;
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  flex-shrink: 0;
}
header .icon { font-size: 1.5rem; }
header h1 { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
header h1 span { color: var(--gold); font-style: italic; }
header p { font-size: 0.72rem; opacity: 0.75; letter-spacing: 0.05em; margin-top: 2px; }

main {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

/* RECORD CARD */
.record-card {
  background: var(--cream);
  border: 1px solid rgba(201,149,42,0.35);
  border-radius: 12px;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  box-shadow: 0 4px 20px var(--shadow);
  flex-shrink: 0;
}

.record-btn {
  width: 76px; height: 76px;
  border-radius: 50%;
  border: 3px solid var(--red-deep);
  background: var(--red-deep);
  color: white; font-size: 1.8rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(122,28,28,0.35);
  transition: transform 0.15s;
  -webkit-appearance: none;
}
.record-btn:active { transform: scale(0.93); }
.record-btn.recording { animation: pulse 1.2s ease-out infinite; background: #a01c1c; }

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(122,28,28,0.55); }
  70%  { box-shadow: 0 0 0 18px rgba(122,28,28,0); }
  100% { box-shadow: 0 0 0 0 rgba(122,28,28,0); }
}

.record-label {
  font-family: 'Playfair Display', serif;
  font-style: italic; color: var(--red-deep);
  font-size: 0.92rem; text-align: center;
}

.timer {
  font-size: 1.35rem; font-weight: 500;
  letter-spacing: 0.12em; color: var(--ink);
  display: none;
}

.waveform {
  display: flex; align-items: center; gap: 3px; height: 26px;
  opacity: 0; transition: opacity 0.3s;
}
.waveform.active { opacity: 1; }
.waveform span {
  display: block; width: 4px;
  background: var(--gold); border-radius: 2px;
  animation: wave 0.9s ease-in-out infinite;
}
.waveform span:nth-child(1){height:8px;animation-delay:0s}
.waveform span:nth-child(2){height:18px;animation-delay:.1s}
.waveform span:nth-child(3){height:24px;animation-delay:.2s}
.waveform span:nth-child(4){height:18px;animation-delay:.3s}
.waveform span:nth-child(5){height:12px;animation-delay:.4s}
.waveform span:nth-child(6){height:22px;animation-delay:.15s}
.waveform span:nth-child(7){height:16px;animation-delay:.25s}
@keyframes wave {
  0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.8)}
}

/* Interim text — mostra o que está sendo captado agora */
.interim-box {
  width: 100%;
  background: rgba(201,149,42,0.08);
  border: 1px dashed rgba(201,149,42,0.4);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.9rem;
  color: #7a5c1e;
  font-style: italic;
  min-height: 36px;
  line-height: 1.5;
  display: none;
}
.interim-box.visible { display: block; }

/* TRANSCRIPT CARD — ocupa o máximo de espaço */
.transcript-card {
  background: var(--cream);
  border: 1px solid rgba(201,149,42,0.35);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px var(--shadow);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(201,149,42,0.2);
  background: rgba(201,149,42,0.07);
  flex-shrink: 0;
}
.card-header h2 { font-family: 'Playfair Display', serif; font-size: 0.92rem; color: var(--red-deep); }
.card-actions { display: flex; gap: 5px; }

.btn-sm {
  font-family: 'Crimson Pro', serif;
  font-size: 0.72rem; letter-spacing: 0.07em;
  text-transform: uppercase; padding: 5px 10px;
  border-radius: 4px; border: 1px solid;
  cursor: pointer; font-weight: 500; -webkit-appearance: none;
}
.btn-copy  { border-color: var(--gold); color: var(--gold); background: transparent; }
.btn-clear { border-color: #c0a080; color: #c0a080; background: transparent; }
.btn-dl    { border-color: var(--red-deep); color: var(--red-deep); background: transparent; }
.btn-copy:active  { background: var(--gold); color: white; }
.btn-clear:active { background: #c0a080; color: white; }
.btn-dl:active    { background: var(--red-deep); color: white; }

.thinking {
  display: none; align-items: center; gap: 8px;
  padding: 8px 14px; font-style: italic;
  color: var(--gold); font-size: 0.88rem; flex-shrink: 0;
}
.thinking.show { display: flex; }
.dots span {
  display: inline-block; width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%; margin: 0 2px;
  animation: blink 1.2s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

/* CAMPO AMPLIADO — ocupa todo espaço restante */
#transcript-box {
  flex: 1;
  width: 100%;
  padding: 16px;
  font-family: 'Crimson Pro', serif;
  font-size: 1.1rem;
  line-height: 1.85;
  color: var(--ink);
  border: none;
  background: transparent;
  resize: none;
  outline: none;
  min-height: 0;
}
#transcript-box::placeholder { color: #bfaa90; font-style: italic; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--red-deep); color: white;
  padding: 10px 22px; border-radius: 20px;
  font-size: 0.9rem; box-shadow: 0 4px 18px rgba(0,0,0,0.25);
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="icon">📖</div>
  <div>
    <h1>Transcritor <span>Ministerial</span></h1>
    <p>Rev. Renan Ferreira da Silva</p>
  </div>
</header>

<main>
  <!-- GRAVAR -->
  <div class="record-card">
    <button class="record-btn" id="recordBtn">🎙️</button>
    <div class="waveform" id="waveform">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="timer" id="timer">00:00</div>
    <div class="record-label" id="recordLabel">Toque para começar a gravar</div>
    <div class="interim-box" id="interimBox">…</div>
  </div>

  <!-- TRANSCRIÇÃO AMPLIADA -->
  <div class="transcript-card">
    <div class="card-header">
      <h2>✍️ Transcrição</h2>
      <div class="card-actions">
        <button class="btn-sm btn-copy" onclick="copyText()">Copiar</button>
        <button class="btn-sm btn-dl"   onclick="downloadText()">Baixar</button>
        <button class="btn-sm btn-clear" onclick="clearText()">Limpar</button>
      </div>
    </div>
    <div class="thinking" id="thinking">
      <span>Corrigindo o texto</span>
      <span class="dots"><span></span><span></span><span></span></span>
    </div>
    <textarea id="transcript-box"
      placeholder="Grave sua mensagem — o texto aparecerá aqui em tempo real enquanto você fala…">
    </textarea>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

// ── ELEMENTOS ─────────────────────────────────────────────────────────────────
const recordBtn   = document.getElementById('recordBtn');
const waveform    = document.getElementById('waveform');
const timerEl     = document.getElementById('timer');
const recordLabel = document.getElementById('recordLabel');
const thinkingEl  = document.getElementById('thinking');
const txBox       = document.getElementById('transcript-box');
const interimBox  = document.getElementById('interimBox');

// ── ESTADO ────────────────────────────────────────────────────────────────────
let isRecording   = false;
let recognition   = null;
let timerInterval = null;
let elapsedSecs   = 0;
let accumulatedText = '';   // tudo que foi confirmado (final)
let shouldRestart = false;  // controla o loop de reinício automático

// ── BOTÃO ─────────────────────────────────────────────────────────────────────
recordBtn.addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});

// ── INICIAR GRAVAÇÃO ──────────────────────────────────────────────────────────
function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Seu navegador não suporta reconhecimento de voz. Use o Chrome.');
    return;
  }

  isRecording    = true;
  shouldRestart  = true;
  accumulatedText = txBox.value.trim(); // preserva o que já estava no campo

  recordBtn.textContent = '⏹️';
  recordBtn.classList.add('recording');
  recordLabel.textContent = 'Gravando… toque para parar';
  waveform.classList.add('active');
  timerEl.style.display = 'block';
  elapsedSecs = 0; updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
  interimBox.classList.add('visible');

  startRecognition();
}

// ── MOTOR DE RECONHECIMENTO (reinicia sozinho) ─────────────────────────────────
function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();

  recognition.lang            = 'pt-BR';
  recognition.continuous      = true;   // mantém escutando
  recognition.interimResults  = true;   // mostra texto parcial enquanto fala
  recognition.maxAlternatives = 1;

  // Resultado (parcial ou final)
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        // Adiciona ao texto acumulado
        accumulatedText += (accumulatedText ? ' ' : '') + transcript.trim();
        txBox.value = accumulatedText;
        txBox.scrollTop = txBox.scrollHeight;
        interim = '';
      } else {
        interim += transcript;
      }
    }
    // Mostra o que está sendo captado agora
    interimBox.textContent = interim || '…';
  };

  // Quando para (timeout do Chrome) — reinicia automaticamente
  recognition.onend = () => {
    if (shouldRestart && isRecording) {
      // Pequena pausa antes de reiniciar para evitar conflito
      setTimeout(() => {
        if (shouldRestart && isRecording) startRecognition();
      }, 200);
    }
  };

  recognition.onerror = (e) => {
    // 'no-speech' é normal — apenas reinicia
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (shouldRestart && isRecording) {
        setTimeout(() => { if (shouldRestart && isRecording) startRecognition(); }, 300);
      }
      return;
    }
    // Erros reais
    if (e.error === 'not-allowed') {
      showToast('Permissão de microfone negada. Ative nas configurações do Chrome.');
      stopRecording();
      return;
    }
    if (e.error === 'network') {
      showToast('Sem conexão. O reconhecimento precisa de internet.');
    }
    // Para outros erros, tenta reiniciar mesmo assim
    if (shouldRestart && isRecording) {
      setTimeout(() => { if (shouldRestart && isRecording) startRecognition(); }, 500);
    }
  };

  try {
    recognition.start();
  } catch(e) {
    // Se já estava rodando, ignora
    console.warn('Recognition start error:', e);
  }
}

// ── PARAR GRAVAÇÃO ────────────────────────────────────────────────────────────
function stopRecording() {
  shouldRestart = false;
  isRecording   = false;

  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }

  clearInterval(timerInterval);
  recordBtn.textContent = '🎙️';
  recordBtn.classList.remove('recording');
  recordLabel.textContent = 'Toque para começar a gravar';
  waveform.classList.remove('active');
  timerEl.style.display = 'none';
  interimBox.classList.remove('visible');
  interimBox.textContent = '…';

  // Se há texto acumulado, envia para correção via IA
  const texto = accumulatedText.trim();
  if (texto) {
    correctWithClaude(texto);
  }
}

// ── CORREÇÃO VIA IA ───────────────────────────────────────────────────────────
async function correctWithClaude(rawText) {
  thinkingEl.classList.add('show');
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: `Você é revisor profissional de livros cristãos em português brasileiro.
Corrija gramática, pontuação e ortografia sem alterar o conteúdo ou o significado.
Organize em parágrafos claros e fluidos, prontos para publicação.
Preserve citações bíblicas, nomes próprios e terminologia teológica.
NÃO adicione introduções, comentários ou explicações — retorne APENAS o texto corrigido.

TEXTO:
${rawText}`
        }]
      })
    });
    const d = await r.json();
    const corrected = (d.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    if (corrected) {
      txBox.value = corrected;
      accumulatedText = corrected;
      txBox.scrollTop = txBox.scrollHeight;
      showToast('Texto corrigido pela IA ✓');
    } else {
      showToast('Texto salvo (correção indisponível).');
    }
  } catch(e) {
    showToast('Sem conexão para corrigir — texto bruto salvo.');
    console.error(e);
  } finally {
    thinkingEl.classList.remove('show');
  }
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function updateTimer() {
  elapsedSecs++;
  const m = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
  const s = String(elapsedSecs % 60).padStart(2, '0');
  timerEl.textContent = `${m}:${s}`;
}

// ── AÇÕES DO CAMPO ────────────────────────────────────────────────────────────
function copyText() {
  const t = txBox.value.trim();
  if (!t) { showToast('Nenhum texto para copiar.'); return; }
  navigator.clipboard.writeText(t).then(() => showToast('Copiado!'));
}

function downloadText() {
  const t = txBox.value.trim();
  if (!t) { showToast('Nenhum texto para baixar.'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([t], { type: 'text/plain;charset=utf-8' }));
  a.download = `transcricao_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  showToast('Arquivo baixado!');
}

function clearText() {
  if (!txBox.value.trim()) return;
  if (confirm('Limpar toda a transcrição?')) {
    txBox.value = '';
    accumulatedText = '';
    showToast('Texto limpo.');
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
</body>
</html>
